<!DOCTYPE html>
<html>
<head>
  <title>StatusDrop - Maintenance</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #000;
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 20px;
    }
    .container { max-width: 400px; }
    .logo { font-size: 48px; margin-bottom: 20px; }
    h1 { color: #25D366; font-size: 24px; margin-bottom: 12px; }
    p { color: #666; font-size: 16px; line-height: 1.6; }
    .eta {
      background: #111;
      border: 1px solid #25D366;
      border-radius: 12px;
      padding: 16px;
      margin: 20px 0;
      color: #25D366;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">🔧</div>
    <h1>We'll be back soon!</h1>
    <p>StatusDrop is upgrading to serve you better!</p>
    <div class="eta">
      ⏱️ Expected back in: <strong>30 minutes</strong>
    </div>
    <p style="color:#444;font-size:13px;">
      We're improving video quality and speed.<br/>
      Thanks for your patience! 💚
    </p>
  </div>
</body>
</html>
